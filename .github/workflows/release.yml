name: Deployment

on:
  workflow_dispatch:

jobs:
  generate-changelog:
    name: Generate changelog
    runs-on: ubuntu-latest
    outputs:
      release_body: ${{ steps.git-cliff.outputs.content }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Generate a changelog
        uses: orhun/git-cliff-action@07dda386992489f0a6151dee53f3a137713644de # main
        id: git-cliff
        with:
          config: cliff.toml
          args: -vv --latest --no-exec

  publish-binaries:
    name: Publish binaries
    needs: generate-changelog
    runs-on: ${{ matrix.build.OS }}

    strategy:
      fail-fast: false
      matrix:
        build:
          - NAME: linux-x64-glibc
            OS: ubuntu-latest
            TARGET: x86_64-unknown-linux-gnu

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set the release version
        shell: bash
        run: echo "RELEASE_VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake build-essential pkg-config

      # ✅ Replace deprecated actions-rs
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.build.TARGET }}

      # ✅ Cache (big speed win)
      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.build.TARGET }}

      # ✅ Dry run before publish (important)
      - name: Verify crate
        if: matrix.build.NAME == 'linux-x64-glibc'
        run: cargo publish --dry-run --allow-dirty --locked -p h5v

      - name: Prepare release assets
        shell: bash
        run: |
          mkdir release

          if [ "${{ matrix.build.OS }}" = "windows-2025" ]; then
            bin="h5v.exe"
          else
            bin="h5v"
          fi

          cp "target/${{ matrix.build.TARGET }}/release/$bin" release/
          mv release/ h5v-${{ env.RELEASE_VERSION }}/

      - name: Create release artifacts
        shell: bash
        run: |
          if [ "${{ matrix.build.OS }}" = "windows-2025" ]; then
            7z a -tzip "h5v-${{ env.RELEASE_VERSION }}-${{ matrix.build.TARGET }}.zip" \
              h5v-${{ env.RELEASE_VERSION }}/
          else
            tar -czvf h5v-${{ env.RELEASE_VERSION }}-${{ matrix.build.TARGET }}.tar.gz \
              h5v-${{ env.RELEASE_VERSION }}/

            sha512sum h5v-${{ env.RELEASE_VERSION }}-${{ matrix.build.TARGET }}.tar.gz \
              > h5v-${{ env.RELEASE_VERSION }}-${{ matrix.build.TARGET }}.tar.gz.sha512
          fi

      - name: Publish to GitHub
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: h5v-${{ env.RELEASE_VERSION }}-${{ matrix.build.TARGET }}*
          file_glob: true
          overwrite: true
          tag: ${{ github.ref }}
          release_name: "Release v${{ env.RELEASE_VERSION }}"
          body: "${{ needs.generate-changelog.outputs.release_body }}"

      - name: Publish to crates.io
        if: matrix.build.NAME == 'linux-x64-glibc' && startsWith(github.ref, 'refs/tags/')
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_TOKEN }}
        run: |
          for i in 1 2 3; do
            cargo publish --locked -p h5v && break
            echo "Publish failed, retrying in 10s..."
            sleep 10
          done
