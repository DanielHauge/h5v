name: Deployment

permissions:
  contents: write
  packages: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Run side-effecting release steps (tags, uploads,
          registry/package-manager publication)"
        type: boolean
        required: true
        default: true

jobs:
  build-test:
    name: Build and verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install dependencies
        run: |
          sudo apt-get update || true
          sudo apt-get install -y --no-install-recommends \
            cmake build-essential pkg-config libfontconfig1-dev libfreetype6-dev libexpat1-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Verify crate
        run: cargo publish --dry-run --allow-dirty -p h5v

  generate-changelog:
    name: Generate changelog and tag
    needs: build-test
    runs-on: ubuntu-latest
    outputs:
      release_body: ${{ steps.git-cliff.outputs.content }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Generate a changelog
        uses: orhun/git-cliff-action@07dda386992489f0a6151dee53f3a137713644de
        id: git-cliff
        with:
          config: cliff.toml
          # Only generate a changelog for the latest release, and bump the version in Cargo.toml
          args: -vv --bump --unreleased

      - name: Extract version
        id: version
        shell: bash
        run: |
          version=$(echo "${{ steps.git-cliff.outputs.content }}" | grep -m1 -oP '(?<=## \[)[^]]+')
          if [ -z "$version" ]; then
            echo "Failed to extract version from changelog"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        if: ${{ inputs.publish }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          tag="v${{ steps.version.outputs.version }}"

          git tag "$tag"
          git push origin "$tag"

  publish-binaries:
    name: Publish binaries
    needs: generate-changelog
    runs-on: ${{ matrix.build.OS }}

    strategy:
      fail-fast: false
      matrix:
        build:
          - NAME: linux-x64-glibc
            OS: ubuntu-latest
            TARGET: x86_64-unknown-linux-gnu
            BIN: h5v
            ARCHIVE_FORMAT: tar.gz
          - NAME: windows-x64-msvc
            OS: windows-latest
            TARGET: x86_64-pc-windows-msvc
            BIN: h5v.exe
            ARCHIVE_FORMAT: zip
          - NAME: macos-x64
            OS: macos-13
            TARGET: x86_64-apple-darwin
            BIN: h5v
            ARCHIVE_FORMAT: tar.gz
          - NAME: macos-arm64
            OS: macos-14
            TARGET: aarch64-apple-darwin
            BIN: h5v
            ARCHIVE_FORMAT: tar.gz

    env:
      RELEASE_VERSION: ${{ needs.generate-changelog.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake build-essential pkg-config libfontconfig1-dev libfreetype6-dev libexpat1-dev

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install cmake pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.build.TARGET }}

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --target ${{ matrix.build.TARGET }}

      - name: Prepare release assets
        shell: bash
        env:
          TARGET: ${{ matrix.build.TARGET }}
          BIN_NAME: ${{ matrix.build.BIN }}
          ARCHIVE_FORMAT: ${{ matrix.build.ARCHIVE_FORMAT }}
        run: |
          python <<'PY'
          import hashlib
          import os
          import pathlib
          import shutil
          import tarfile
          import zipfile

          release_version = os.environ["RELEASE_VERSION"]
          target = os.environ["TARGET"]
          bin_name = os.environ["BIN_NAME"]
          archive_format = os.environ["ARCHIVE_FORMAT"]

          archive_stem = f"h5v-{target}-v{release_version}"
          root_dir = pathlib.Path(archive_stem)
          root_dir.mkdir(exist_ok=True)

          binary_path = pathlib.Path("target") / target / "release" / bin_name
          shutil.copy2(binary_path, root_dir / bin_name)

          if archive_format == "tar.gz":
              archive_path = pathlib.Path(f"{archive_stem}.tar.gz")
              with tarfile.open(archive_path, "w:gz") as tar:
                  tar.add(root_dir, arcname=root_dir.name)
          elif archive_format == "zip":
              archive_path = pathlib.Path(f"{archive_stem}.zip")
              with zipfile.ZipFile(archive_path, "w", compression=zipfile.ZIP_DEFLATED) as archive:
                  for path in root_dir.rglob("*"):
                      archive.write(path, arcname=path.relative_to(root_dir.parent))
          else:
              raise RuntimeError(f"Unsupported archive format: {archive_format}")

          digest = hashlib.sha256(archive_path.read_bytes()).hexdigest()
          pathlib.Path(f"{archive_path.name}.sha256").write_text(
              f"{digest}  {archive_path.name}\n",
              encoding="utf-8",
          )
          shutil.rmtree(root_dir)
          PY

      - name: Publish to GitHub
        uses: svenstaro/upload-release-action@v2
        if: ${{ inputs.publish }}
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: h5v-${{ matrix.build.TARGET }}-v${{ env.RELEASE_VERSION }}*
          file_glob: true
          overwrite: false
          tag: v${{ env.RELEASE_VERSION }}
          release_name: Release v${{ env.RELEASE_VERSION }}
          body: ${{ needs.generate-changelog.outputs.release_body }}

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.build.TARGET }}
          path: h5v-${{ matrix.build.TARGET }}-v${{ env.RELEASE_VERSION }}*
          if-no-files-found: error

      - name: Publish to crates.io
        if: ${{ matrix.build.NAME == 'linux-x64-glibc' && inputs.publish }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_TOKEN }}
        run: |
          for i in {1..5}; do
            sed -i "s/^version = .*/version = \"${{ needs.generate-changelog.outputs.version }}\"/" Cargo.toml
            cargo publish -p h5v --allow-dirty && break
            echo "Publish failed, retrying in 10s..."
            sleep 10
          done

  package-manager-assets:
    name: Generate package manager assets
    needs:
      - generate-changelog
      - publish-binaries
    runs-on: ubuntu-latest
    env:
      RELEASE_VERSION: ${{ needs.generate-changelog.outputs.version }}
      REPOSITORY: ${{ github.repository }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: release-assets

      - name: Generate Homebrew and WinGet assets
        run: |
          python scripts/generate_package_manager_assets.py \
            --version "${RELEASE_VERSION}" \
            --repo "${REPOSITORY}" \
            --asset-dir release-assets \
            --output-dir package-manager-assets

      - name: Upload package manager artifacts
        uses: actions/upload-artifact@v4
        with:
          name: package-manager-assets
          path: package-manager-assets/**
          if-no-files-found: error

      - name: Publish package manager assets to GitHub
        uses: svenstaro/upload-release-action@v2
        if: ${{ inputs.publish }}
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: package-manager-assets/**
          file_glob: true
          overwrite: true
          tag: v${{ env.RELEASE_VERSION }}
          release_name: Release v${{ env.RELEASE_VERSION }}

  publish-homebrew-formula:
    name: Publish Homebrew formula
    needs:
      - generate-changelog
      - package-manager-assets
    runs-on: ubuntu-latest
    env:
      RELEASE_VERSION: ${{ needs.generate-changelog.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Download package manager artifacts
        uses: actions/download-artifact@v4
        with:
          name: package-manager-assets
          path: package-manager-assets

      - name: Update Formula/h5v.rb
        run: |
          mkdir -p Formula
          cp package-manager-assets/homebrew/h5v.rb Formula/h5v.rb

      - name: Commit formula update
        if: ${{ inputs.publish }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/h5v.rb
          if git diff --cached --quiet; then
            echo "Formula unchanged"
            exit 0
          fi
          git commit -m "chore: update Homebrew formula for v${RELEASE_VERSION}"
          git push origin HEAD:${{ github.ref_name }}

  publish-scoop-manifest:
    name: Publish Scoop manifest
    needs:
      - generate-changelog
      - package-manager-assets
    runs-on: ubuntu-latest
    env:
      RELEASE_VERSION: ${{ needs.generate-changelog.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Download package manager artifacts
        uses: actions/download-artifact@v4
        with:
          name: package-manager-assets
          path: package-manager-assets

      - name: Update bucket/h5v.json
        run: |
          mkdir -p bucket
          cp package-manager-assets/scoop/h5v.json bucket/h5v.json

      - name: Commit Scoop manifest update
        if: ${{ inputs.publish }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bucket/h5v.json
          if git diff --cached --quiet; then
            echo "Scoop manifest unchanged"
            exit 0
          fi
          git commit -m "chore: update Scoop manifest for v${RELEASE_VERSION}"
          git push origin HEAD:${{ github.ref_name }}

  submit-winget:
    name: Submit WinGet manifest
    needs:
      - generate-changelog
      - package-manager-assets
    if: ${{ inputs.publish }}
    runs-on: windows-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      RELEASE_VERSION: ${{ needs.generate-changelog.outputs.version }}
      WINGET_CREATE_GITHUB_TOKEN: ${{ secrets.WINGET_CREATE_GITHUB_TOKEN }}

    steps:
      - name: Download package manager artifacts
        uses: actions/download-artifact@v4
        with:
          name: package-manager-assets
          path: package-manager-assets

      - name: Submit WinGet manifest
        shell: pwsh
        run: |
          curl.exe -JLO https://aka.ms/wingetcreate/latest
          $manifestPath = "package-manager-assets/winget/manifests/d/DanielHauge/h5v/${env:RELEASE_VERSION}"
          .\wingetcreate.exe submit --prtitle "Add h5v ${env:RELEASE_VERSION}" --no-open $manifestPath

  publish-aur:
    name: Publish AUR package
    needs:
      - package-manager-assets
    if: ${{ inputs.publish }}
    runs-on: ubuntu-latest

    steps:
      - name: Download package manager artifacts
        uses: actions/download-artifact@v4
        with:
          name: package-manager-assets
          path: package-manager-assets

      - name: Generate .SRCINFO
        run: |
          docker run --rm \
            -v "${PWD}/package-manager-assets/aur:/work" \
            -w /work \
            archlinux:base-devel \
            bash -lc 'useradd -m builder && chown -R builder:builder /work && su builder -c "bash -lc '\''cd /work && makepkg --printsrcinfo > .SRCINFO'\''"'

      - name: Configure AUR SSH
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' "$AUR_SSH_PRIVATE_KEY" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          cat >> ~/.ssh/config <<'EOF'
          Host aur.archlinux.org
            IdentityFile ~/.ssh/aur
            IdentitiesOnly yes
            StrictHostKeyChecking accept-new
          EOF

      - name: Push PKGBUILD to AUR
        run: |
          git clone ssh://aur@aur.archlinux.org/h5v-bin.git aur-repo
          cp package-manager-assets/aur/PKGBUILD aur-repo/PKGBUILD
          cp package-manager-assets/aur/.SRCINFO aur-repo/.SRCINFO
          cd aur-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add PKGBUILD .SRCINFO
          if git diff --cached --quiet; then
            echo "AUR package unchanged"
            exit 0
          fi
          git commit -m "Update h5v-bin package"
          git push origin HEAD
